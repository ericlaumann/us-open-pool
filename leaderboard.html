<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>The Laumann Leaderboard</title>
<style>
  :root{
    --navy:#0A2240; --navy2:#0E2C52; --gold:#B68A3E; --gold-soft:#C9A24B;
    --cream:#F5F2EA; --card:#FFFFFF; --ink:#15202E; --muted:#5C6672;
    --line:#E6E0D2; --red:#C8102E; --over:#46566E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:var(--cream); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;
  }
  .wrap{max-width:600px; margin:0 auto; padding-bottom:40px;}
  .hero{ background:var(--navy); color:#fff; padding:26px 22px 22px; border-bottom:3px solid var(--gold); }
  .kicker{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-soft); font-weight:600; }
  .hero h1{ font-family:Georgia,"Times New Roman",serif; font-weight:400; font-size:30px; margin:8px 0 0; }
  .statusline{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:12px; font-size:13px; color:#C9D3E0; }
  .live{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:8px; height:8px; border-radius:50%; background:#3DDC84; box-shadow:0 0 0 0 rgba(61,220,132,.7); animation:pulse 1.8s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(61,220,132,.6);} 70%{box-shadow:0 0 0 7px rgba(61,220,132,0);} 100%{box-shadow:0 0 0 0 rgba(61,220,132,0);} }
  .refresh{ margin-left:auto; background:transparent; border:1px solid #324B6E; color:#C9D3E0; font:inherit; font-size:12px; padding:6px 11px; border-radius:8px; cursor:pointer; }
  .board{ padding:16px 14px 0; }
  .pcard{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 14px 6px; margin-bottom:12px; }
  .pcard.leader{ border-color:var(--gold); border-top:3px solid var(--gold); }
  .phead{ display:flex; align-items:center; gap:12px; }
  .rankbadge{ flex:0 0 auto; width:34px; height:34px; border-radius:50%; background:var(--navy); color:#fff; font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center; }
  .leader .rankbadge{ background:var(--gold); color:var(--navy); }
  .pname{ font-size:18px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .leadertag{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold); border-radius:5px; padding:2px 6px; font-weight:700; }
  .move{ font-size:12px; margin-left:2px; }
  .up{ color:#1A8F4C; } .down{ color:var(--red); } .flat{ color:var(--muted); }
  .ptot{ margin-left:auto; text-align:right; }
  .ptot .num{ font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1; }
  .ptot .lab{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .glist{ margin-top:12px; border-top:1px solid var(--line); }
  .grow{ display:flex; align-items:center; gap:10px; padding:9px 2px; border-bottom:1px solid #F0EBDD; }
  .grow:last-child{ border-bottom:none; }
  .gname{ font-size:14.5px; }
  .gsub{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .gtot{ margin-left:auto; font-size:16px; font-weight:600; font-variant-numeric:tabular-nums; min-width:38px; text-align:right; }
  .red{ color:var(--red); } .over{ color:var(--over); } .even{ color:var(--ink); }
  .cuttag{ font-size:10px; letter-spacing:.06em; color:var(--red); border:1px solid var(--red); border-radius:4px; padding:1px 5px; margin-left:6px; text-transform:uppercase; }
  .cut .gname{ text-decoration:line-through; color:var(--muted); }
  .note{ padding:10px 22px 0; font-size:12px; color:var(--muted); line-height:1.6; }
  .loading{ padding:40px 22px; text-align:center; color:var(--muted); font-size:14px; }
  .err{ padding:18px 22px; color:var(--red); font-size:13.5px; }
  .toggle{ display:flex; justify-content:center; padding:14px 14px 2px; }
  .segwrap{ display:inline-flex; background:#EDE7D8; border:1px solid var(--line); border-radius:10px; padding:3px; }
  .seg{ text-decoration:none; font-size:13.5px; font-weight:600; color:var(--navy); padding:8px 20px; border-radius:8px; }
  .seg.active{ background:var(--navy); color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="kicker">U.S. Open Pool · Shinnecock Hills</div>
    <h1>The Laumann Leaderboard</h1>
    <div class="statusline">
      <span class="live"><span class="dot"></span><span id="evstatus">Loading…</span></span>
      <span id="updated"></span>
      <button class="refresh" id="refresh">Refresh</button>
    </div>
  </header>

  <nav class="toggle"><div class="segwrap">
    <a class="seg active" href="leaderboard.html">Standings</a>
    <a class="seg" href="board.html">Golfers</a>
    <a class="seg" href="final.html">Final</a>
  </div></nav>

  <div id="board" class="board"><div class="loading">Pulling live scores…</div></div>

  <p class="note">Ranked by each player&rsquo;s four golfers&rsquo; combined score to par — lowest wins. The championship is final; the official pool result is by <strong>total prize money</strong> — see the <a href="final.html" style="color:var(--navy)">Final</a> tab.</p>
</div>

<script>
(function(){
  var PICKS={
    "Dad":[["Scottie Scheffler","+550"],["Cameron Young","+2000"],["Wyndham Clark","+4000"],["Robert MacIntyre","+6600"]],
    "Mark":[["Rory McIlroy","+1200"],["Tommy Fleetwood","+2000"],["Viktor Hovland","+4500"],["Robert MacIntyre","+6600"]],
    "JJ":[["Scottie Scheffler","+550"],["Cameron Young","+2000"],["Sam Burns","+4000"],["Cameron Smith","+9000"]],
    "E-Man":[["Scottie Scheffler","+550"],["Ludvig Åberg","+2200"],["Sam Burns","+4000"],["Kurt Kitayama","+6600"]]
  };
  var URL="https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?dates=20260621";
  var norm=function(s){return (s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().replace(/[.\-']/g,"").replace(/\s+/g," ").trim();};
  var lastUpdate=null, prevOrder=null;

  function parToNum(dv){
    if(dv==null) return null;
    dv=String(dv).trim();
    if(dv==="E") return 0;
    if(dv===""||dv==="-"||/^(CUT|WD|DQ|MDF)$/i.test(dv)) return null;
    var n=parseInt(dv,10); return isNaN(n)?null:n;
  }
  function fmtPar(n){ if(n==null) return "—"; if(n===0) return "E"; return n>0?("+"+n):(""+n); }
  function parClass(n){ if(n==null) return "even"; if(n<0) return "red"; if(n>0) return "over"; return "even"; }
  function fmtTee(iso){ try{ var d=new Date(iso); return d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }catch(e){ return ""; } }

  function parRoundSum(c){
    var ls=c.linescores||[], sum=0, any=false;
    for(var i=0;i<ls.length;i++){ var n=parToNum(ls[i]&&ls[i].displayValue); if(n!=null){ sum+=n; any=true; } }
    return any?sum:null;
  }
  function buildMap(comp){
    var map={};
    (comp.competitors||[]).forEach(function(c){
      var a=c.athlete||{}, s=c.status||{}, pos=s.position||{};
      var posName=pos.displayName||pos.displayValue||"";
      var state=(s.type&&s.type.state)||"";
      var typeDetail=(s.type&&(s.type.detail||s.type.description))||"";
      var cut=/CUT|WD|DQ|MDF/i.test(posName)||/cut|withdraw|disqual/i.test(typeDetail);
      var thru=s.thru||0;
      var overall=parRoundSum(c);
      var started=state==="in"||state==="post"||overall!=null||thru>0;
      map[norm(a.displayName)]={
        name:a.displayName,
        toPar:started?(overall==null?0:overall):null,
        thru:thru, period:s.period,
        pos:(posName&&posName!=="-")?posName:"",
        tee:s.teeTime||"",
        started:started, cut:cut
      };
    });
    return map;
  }

  function golferLine(g){
    if(!g) return null;
    var bits=[];
    if(g.pos && g.pos!=="-") bits.push(g.pos);
    if(g.started){
      if(g.thru===18) bits.push("F");
      else if(g.thru>0) bits.push("thru "+g.thru);
    } else if(g.tee){
      bits.push(fmtTee(g.tee)+" tee");
    }
    return bits.join(" · ");
  }

  function render(data){
    var ev=data.events&&data.events[0];
    if(!ev){ document.getElementById("board").innerHTML='<div class="err">No tournament data right now — it may be between rounds. I&rsquo;ll keep trying.</div>'; return; }
    var comp=ev.competitions[0];
    var map=buildMap(comp);
    document.getElementById("evstatus").textContent=(comp.status&&comp.status.type&&comp.status.type.detail)||ev.name||"Live";

    var players=Object.keys(PICKS).map(function(pname){
      var golfers=PICKS[pname].map(function(p){
        var g=map[norm(p[0])];
        return g?Object.assign({odds:p[1]},g):{name:p[0],odds:p[1],toPar:null,started:false,pos:"",thru:0,cut:false,tee:""};
      });
      var combined=golfers.reduce(function(a,g){ return a+(g.toPar||0); },0);
      return {name:pname, golfers:golfers, combined:combined};
    });

    players.sort(function(a,b){ return a.combined-b.combined; });
    var rank=0, prev=null, counts={};
    players.forEach(function(p,i){ if(prev===null||p.combined!==prev){ rank=i+1; prev=p.combined; } p.rank=rank; counts[rank]=(counts[rank]||0)+1; });

    var order=players.map(function(p){return p.name;});
    players.forEach(function(p){
      if(prevOrder){ var was=prevOrder.indexOf(p.name), now=order.indexOf(p.name); p.delta=was<0?0:(was-now); }
      else p.delta=0;
    });
    prevOrder=order;

    var sep=counts[1]<players.length;
    var html=players.map(function(p){
      var tie=counts[p.rank]>1;
      var isLead=p.rank===1&&sep;
      var mv=p.delta>0?'<span class="move up">▲'+p.delta+'</span>':(p.delta<0?'<span class="move down">▼'+Math.abs(p.delta)+'</span>':'<span class="move flat">–</span>');
      var grows=p.golfers.map(function(g){
        var sub=golferLine(g);
        return '<div class="grow'+(g.cut?' cut':'')+'">'+
          '<div><div class="gname">'+g.name+(g.cut?'<span class="cuttag">Cut</span>':'')+'</div>'+
          '<div class="gsub">'+g.odds+(sub?' · '+sub:'')+'</div></div>'+
          '<div class="gtot '+parClass(g.toPar)+'">'+fmtPar(g.toPar)+'</div></div>';
      }).join("");
      return '<div class="pcard'+(isLead?' leader':'')+'">'+
        '<div class="phead">'+
          '<div class="rankbadge">'+(tie?'T':'')+p.rank+'</div>'+
          '<div class="pname">'+p.name+(isLead?'<span class="leadertag">Leader</span>':'')+mv+'</div>'+
          '<div class="ptot"><div class="num '+parClass(p.combined)+'">'+fmtPar(p.combined)+'</div><div class="lab">to par</div></div>'+
        '</div>'+
        '<div class="glist">'+grows+'</div>'+
      '</div>';
    }).join("");
    document.getElementById("board").innerHTML=html;
    lastUpdate=Date.now(); tickUpdated();
  }

  function tickUpdated(){
    if(!lastUpdate) return;
    var s=Math.round((Date.now()-lastUpdate)/1000);
    var t= s<60? s+"s ago" : Math.floor(s/60)+"m ago";
    document.getElementById("updated").textContent="updated "+t;
  }

  function load(){
    fetch(URL+"&_="+Date.now(),{cache:"no-store"}).then(function(r){return r.json();}).then(render).catch(function(){
      document.getElementById("board").innerHTML='<div class="err">Couldn&rsquo;t reach live scores. Retrying in a minute…</div>';
    });
  }

  document.getElementById("refresh").addEventListener("click",load);
  load();
  setInterval(load,60000);
  setInterval(tickUpdated,1000);
  document.addEventListener("visibilitychange",function(){ if(!document.hidden) load(); });
  window.addEventListener("focus",load);
})();
</script>
</body>
</html>
